version = 1

# renovate.json is JSON (no comment syntax) and follows Renovate's fixed schema;
# it extends the org-wide preset at github.com/metio/renovate-config.
[[annotations]]
path = "renovate.json"
precedence = "override"
SPDX-FileCopyrightText = "The kurly Authors"
SPDX-License-Identifier = "0BSD"

# jsonnetfile.json is jsonnet-bundler's dependency manifest; JSON carries no
# inline header.
[[annotations]]
path = "jsonnetfile.json"
precedence = "override"
SPDX-FileCopyrightText = "The kurly Authors"
SPDX-License-Identifier = "0BSD"

# catalog/catalog.json is generated from the library annotations by
# catalog/catalog.jsonnet; JSON carries no inline header.
[[annotations]]
path = "catalog/catalog.json"
precedence = "override"
SPDX-FileCopyrightText = "The kurly Authors"
SPDX-License-Identifier = "0BSD"

# flake.lock is nix-generated JSON; it pins the toolchain both CI and local
# shells resolve from flake.nix.
[[annotations]]
path = "flake.lock"
precedence = "override"
SPDX-FileCopyrightText = "The kurly Authors"
SPDX-License-Identifier = "0BSD"

# The documentation site, the Claude skill, and the plugin manifests.
# `aggregate` lets a file's own inline header win where it has one (the layouts,
# CSS, scripts, and the skill's reference.md do); the content markdown, JSON
# manifests, SKILL.md front matter, and hugo.toml fall back to this. The
# docs/themes/metio submodule is a separate repo, outside this scope.
[[annotations]]
path = ["docs/**", "skills/**", ".claude-plugin/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "The kurly Authors"
SPDX-License-Identifier = "0BSD"

# .gitmodules registers the docs theme git submodule; it has no comment syntax.
[[annotations]]
path = ".gitmodules"
precedence = "override"
SPDX-FileCopyrightText = "The kurly Authors"
SPDX-License-Identifier = "0BSD"
