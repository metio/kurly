# Installs Nix and restores/saves the /nix store through the GitHub Actions
# cache, keyed on the flake pin — so a gate job only ever downloads the
# devShell closure when flake.nix or flake.lock changed; every other run
# restores it in seconds. The prefix fallback restores the previous store on
# a key miss, so even a lock bump only fetches the delta from cache.nixos.org.
# Saves happen automatically at job end on a key miss; when several jobs race
# to save the same key, the first wins and the rest skip. Old caches are
# evicted by GitHub's LRU policy — nothing to purge by hand.
name: Nix devShell
description: Install Nix with the /nix store cached, keyed on the flake pin
runs:
  using: composite
  steps:
    - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
    - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
