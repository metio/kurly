# Multi-unit releases from one repository, modeled on metio/helm-charts: each
# releasable unit — the library plus every directory under workloads/ — is
# detected, versioned, published, tagged (<unit>-<version>), and changelogged
# independently. Every unit released in one run shares a single metio/ci
# calver version; release notes are rendered per unit by git-cliff, scoped to
# the unit's paths and tag lineage, so one unit's commits never leak into
# another's changelog and one unit's failure never blocks another's release.
#
# Units and their artifacts:
# - library → ghcr.io/metio/kurly — single-layer image laid out like a jb
#   vendor/ tree (Flux OCIRepository source, image-volume mount, jb install).
# - workloads/<name> → ghcr.io/metio/kurly/workloads/<name> — a SINGLE-LAYER
#   FROM-scratch vendor-tree image of the workload's jsonnet SOURCE (same shape
#   as the library image), rendered by JaaS with the consumer's parameters.
#
# Change detection covers this push's range only (like helm-charts): a failed
# run is recovered by re-running via workflow_dispatch, whose empty input
# releases everything. Library changes do not re-release workloads — a
# workload picks up library changes with its own next release (or a forced
# dispatch), mirroring how helm-charts handles its common library chart.
name: Release
on:
  push:
    branches: [main]
    paths:
      - '*.libsonnet'
      - 'lib/**'
      - Containerfile
      - workload.Containerfile
      - 'workloads/**'
      # A workload README is documentation, not shipped in the source artifact,
      # so a README-only edit must not cut a release.
      - '!workloads/**/README.md'
  workflow_dispatch:
    inputs:
      unit:
        description: Unit to force-release ("library" or a directory name under workloads/). Leave empty to release every unit.
        required: false
permissions:
  contents: read
# Serialize release runs. A unit's release notes are scoped to the range since
# its previous <unit>-* tag; two runs touching the same unit in quick
# succession would race on creating that tag and produce overlapping notes.
# Queueing (no cancel) lets the earlier run tag first.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  discover:
    name: Discover changed units
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      library: ${{ steps.changed.outputs.library }}
      workloads: ${{ steps.changed.outputs.workloads }}
      any: ${{ steps.changed.outputs.any }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - id: changed
        env:
          # Via env, never inlined into the script: a dispatch input containing
          # a quote would otherwise inject commands into the release pipeline.
          UNIT_INPUT: ${{ github.event.inputs.unit }}
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          all_workloads() { find workloads -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort || true; }
          # "library" is the library unit's tag prefix — a workload directory
          # of that name would collide with it.
          if all_workloads | grep -qx 'library'; then
            echo "::error::a workload must not be named 'library' (reserved for the library unit's tags)"
            exit 1
          fi
          library=false
          workloads=""
          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ -z "$UNIT_INPUT" ]; then
              library=true
              workloads="$(all_workloads)"
            elif [ "$UNIT_INPUT" = "library" ]; then
              library=true
            elif [ -d "workloads/$UNIT_INPUT" ]; then
              workloads="$UNIT_INPUT"
            else
              echo "::error::no such unit: $UNIT_INPUT"
              exit 1
            fi
          else
            # On the first push to the branch BEFORE is the all-zeros SHA (and
            # the commit isn't present), so the diff would fail — treat every
            # unit as changed instead of silently releasing nothing.
            if [ -z "$BEFORE" ] || ! git rev-parse -q --verify "${BEFORE}^{commit}" >/dev/null 2>&1; then
              library=true
              workloads="$(all_workloads)"
            else
              diff="$(git diff --name-only "$BEFORE" "$SHA")"
              # The library unit is main.libsonnet plus the recipe modules under
              # lib/ (and its Containerfile). Matching only root-level *.libsonnet
              # would miss every lib/ change and silently skip a library release.
              echo "$diff" | grep -qE '^([^/]+\.libsonnet|lib/.*\.libsonnet|Containerfile)$' && library=true
              # A README-only change to a workload is not a release (the README
              # is docs, not part of the shipped source artifact). And only a
              # workload whose directory still EXISTS is releasable — a DELETED
              # workload still appears in the diff's paths but has nothing to
              # release (it would publish a bogus empty image + tag).
              workloads="$(echo "$diff" | grep -v '/README\.md$' | grep -oP '^workloads/\K[^/]+' | sort -u \
                | while IFS= read -r w; do [ -n "$w" ] && [ -d "workloads/$w" ] && echo "$w"; done || true)"
              # The shared workload Containerfile packages EVERY workload, so a
              # change to it must re-release all of them — otherwise editing the
              # build would silently rebuild nothing.
              if echo "$diff" | grep -qx 'workload.Containerfile'; then
                workloads="$(all_workloads)"
              fi
            fi
          fi
          {
            echo "library=$library"
            echo "workloads=$(printf '%s\n' "$workloads" | grep -v '^$' | jq --raw-input . | jq --slurp --compact-output .)"
            if [ "$library" = "true" ] || [ -n "$workloads" ]; then echo "any=true"; else echo "any=false"; fi
          } >> "$GITHUB_OUTPUT"
      - id: version
        name: Compute the shared version for this run
        if: steps.changed.outputs.any == 'true'
        uses: metio/ci/calver@749a4d81adf23ed252c309fa8bd94aec0e6b03c7 # 2026.7.15145237
  validate:
    name: Test the library and workloads
    needs: discover
    if: needs.discover.outputs.any == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command check-tests
      - run: nix develop --command check-examples
      - run: nix develop --command check-security
  library:
    name: Release the library
    needs: [discover, validate]
    if: needs.discover.outputs.library == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # push the library-<version> tag + GitHub Release
      packages: write # push to GHCR
      id-token: write # cosign keyless image signing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - name: Assert single layer and render from the built image
        # Single layer is the library-image contract: it serves as both an
        # image-volume mount and a Flux OCIRepository source without a
        # layerSelector. (Workload source images are single-layer for the same
        # reason — see the workload job below.)
        #
        # And the layer must carry the WHOLE library, not just main.libsonnet:
        # render kurly.http straight out of the image's own tree, with
        # k8s-libsonnet supplied separately the way JaaS does. A layer missing
        # lib/ passes the count check but fails the first `import './lib/…'` — so
        # this render, not the count, is what proves the artifact is consumable.
        run: |
          set -euo pipefail
          docker buildx build --load --file Containerfile --tag kurly-verify:latest .
          n=$(docker image inspect kurly-verify:latest --format '{{ len .RootFS.Layers }}')
          [ "$n" = "1" ] || { echo "::error::kurly image has $n layers, expected 1"; exit 1; }
          tree="$(mktemp -d)"
          # A FROM-scratch image carries no command, and `docker create` rejects
          # that ("No command specified") — pass a throwaway one; it is never run,
          # the container exists only to export its filesystem.
          cid="$(docker create kurly-verify:latest /nonexistent)"
          docker export "$cid" | tar -xf - -C "$tree"
          docker rm "$cid" >/dev/null
          # k8s-libsonnet is not in the image (JaaS supplies it); vendor it here
          # and drop just its tree beside the extracted library.
          nix develop --command jb install
          cp -r vendor/github.com/jsonnet-libs "$tree/github.com/"
          kind="$(nix develop --command jsonnet -J "$tree" -e \
            "local kurly = import 'github.com/metio/kurly/main.libsonnet'; kurly.list(kurly.http('probe', 'img:1')).items[0].kind")"
          [ "$kind" = '"Deployment"' ] || { echo "::error::library image did not render kurly.http (got: $kind) — the layer is missing lib/"; exit 1; }
          echo "library image renders kurly.http from its own tree"
      - name: Build, push and sign the image
        uses: metio/ci/container-release@749a4d81adf23ed252c309fa8bd94aec0e6b03c7 # 2026.7.15145237
        with:
          image: ghcr.io/metio/kurly
          version: ${{ needs.discover.outputs.version }}
          file: ./Containerfile
      - id: prev
        name: Find this unit's previous tag
        run: echo "prev=$(git tag --list 'library-*' --sort=-creatordate | head -1)" >> "$GITHUB_OUTPUT"
      - id: notes
        name: Generate Release Notes
        uses: metio/ci/release-notes@749a4d81adf23ed252c309fa8bd94aec0e6b03c7 # 2026.7.15145237
        env:
          # The org cliff config renders the unit name into the notes header.
          CHART: library
        with:
          version: library-${{ needs.discover.outputs.version }}
          previous: ${{ steps.prev.outputs.prev }}
          # Path-scoped notes since this unit's last tag; tag-pattern keeps
          # another unit's tag inside the range from splitting the notes.
          include-paths: '*.libsonnet lib Containerfile'
          tag-pattern: ^library-
      - name: Tag and publish the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.discover.outputs.version }}
          SHA: ${{ github.sha }}
          NOTES: ${{ steps.notes.outputs.file }}
        run: |
          set -euo pipefail
          tag="library-${VERSION}"
          cat >> "$NOTES" <<EOF

          ## Artifacts

          \`ghcr.io/metio/kurly:${VERSION}\` — single layer, jb vendor-tree
          layout; register it as a JsonnetLibrary (Flux OCIRepository source)
          or mount it as an image volume. Signed with cosign keyless.
          EOF
          git tag "$tag" "$SHA"
          git push origin "$tag"
          gh release create "$tag" --title "$tag" --notes-file "$NOTES"
  workload:
    name: Release workload ${{ matrix.workload }}
    needs: [discover, validate]
    if: needs.discover.outputs.workloads != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # One workload's failure must not block another's release.
      fail-fast: false
      matrix:
        workload: ${{ fromJSON(needs.discover.outputs.workloads) }}
    permissions:
      contents: write # push the <workload>-<version> tag + GitHub Release
      packages: write # push to GHCR
      id-token: write # cosign keyless image signing
    env:
      WORKLOAD: ${{ matrix.workload }}
      VERSION: ${{ needs.discover.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - name: Stamp the release version into the workload's version.txt
        # The image ships SOURCE, and a stage reads its version with
        # `importstr './version.txt'`, so the release version has to be in that
        # file before the build — nothing renders here to inject it later. It is a
        # data file (no SPDX header, or the header would land inside the version
        # string), covered by REUSE.toml. Writing it whole keeps the build a plain
        # COPY.
        run: |
          set -euo pipefail
          printf '%s\n' "$VERSION" > "workloads/$WORKLOAD/version.txt"
      - name: Assert single layer and the version stamped in
        # container-release builds and pushes the multi-arch image; do a local
        # single-arch build first to check the contract cheaply: one COPY of one
        # directory is one layer (a selector-less OCIRepository and JaaS's
        # vendor-tree search both depend on it), and the shipped version.txt must
        # carry this run's version — proof the stamp above reached the image.
        run: |
          set -euo pipefail
          docker buildx build --load --file workload.Containerfile --build-arg "WORKLOAD=$WORKLOAD" --tag kurly-wl-verify:latest .
          n="$(docker image inspect kurly-wl-verify:latest --format '{{ len .RootFS.Layers }}')"
          [ "$n" = "1" ] || { echo "::error::workload image has $n layers, expected 1"; exit 1; }
          tree="$(mktemp -d)"
          # A FROM-scratch image has no command; `docker create` needs one named
          # (never run — the container only exists to export its filesystem).
          cid="$(docker create kurly-wl-verify:latest /nonexistent)"
          docker export "$cid" | tar -xf - -C "$tree"
          docker rm "$cid" >/dev/null
          stamped="$(tr -d '[:space:]' < "$tree/github.com/metio/kurly/workloads/$WORKLOAD/version.txt")"
          [ "$stamped" = "$VERSION" ] || { echo "::error::workload image version.txt is '$stamped', expected '$VERSION'"; exit 1; }
      - id: build
        name: Build, push and sign the image
        uses: metio/ci/container-release@749a4d81adf23ed252c309fa8bd94aec0e6b03c7 # 2026.7.15145237
        with:
          image: ghcr.io/metio/kurly/workloads/${{ matrix.workload }}
          version: ${{ needs.discover.outputs.version }}
          file: ./workload.Containerfile
          build-args: WORKLOAD=${{ matrix.workload }}
      - id: prev
        name: Find this unit's previous tag
        run: echo "prev=$(git tag --list "${WORKLOAD}-*" --sort=-creatordate | head -1)" >> "$GITHUB_OUTPUT"
      - id: notes
        name: Generate Release Notes
        uses: metio/ci/release-notes@749a4d81adf23ed252c309fa8bd94aec0e6b03c7 # 2026.7.15145237
        env:
          # The org cliff config renders the unit name into the notes header.
          CHART: ${{ matrix.workload }}
        with:
          version: ${{ matrix.workload }}-${{ needs.discover.outputs.version }}
          previous: ${{ steps.prev.outputs.prev }}
          # Path-scoped notes since this unit's last tag; tag-pattern keeps
          # another unit's tag inside the range from splitting the notes.
          include-paths: workloads/${{ matrix.workload }}/**
          tag-pattern: ^${{ matrix.workload }}-
      - name: Tag and publish the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          NOTES: ${{ steps.notes.outputs.file }}
        run: |
          set -euo pipefail
          tag="${WORKLOAD}-${VERSION}"
          cat >> "$NOTES" <<EOF

          ## Artifacts

          \`ghcr.io/metio/kurly/workloads/${WORKLOAD}:${VERSION}\` — the
          workload's jsonnet SOURCE (single-layer, vendor-tree layout, this
          version stamped into it), rendered by JaaS with your own parameters.
          Pull it with a selector-less Flux OCIRepository (it is single-layer,
          like the library image), reference it from a JaaS JsonnetSnippet
          (importing the kurly JsonnetLibrary), compose your environment with
          \`+\` features, and feed the result into a stageset StageSet — see the
          workload's README. Signed with cosign keyless.
          EOF
          git tag "$tag" "$SHA"
          git push origin "$tag"
          gh release create "$tag" --title "$tag" --notes-file "$NOTES"
