# Publishes the kurly library as a single-layer, multi-arch OCI image
# (ghcr.io/metio/kurly), laid out like a jb vendor/ tree so it is consumable
# as a Flux OCIRepository source or an image-volume mount — the same shape as
# the JOI library images. The full assertion suite and example validation run
# first, so a broken library never publishes.
name: Release
on:
  push:
    branches: [main]
    paths:
      - '*.libsonnet'
      - Containerfile
      - .github/workflows/release.yml
  workflow_dispatch:
permissions:
  contents: read
env:
  IMAGE: ghcr.io/metio/kurly
jobs:
  validate:
    name: Test the library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/nix-devshell
      - name: Vendor k8s-libsonnet
        run: nix develop --command jb install
      - name: Run the assertion suite
        run: |
          nix develop --command bash -c "
            jsonnet -J vendor tests/kurly_test.jsonnet \
              | jq -e 'to_entries | all(.value == true)' >/dev/null
          "
      - name: Render examples and validate against the Kubernetes schemas
        run: nix develop --command hack/validate-examples.sh
  publish:
    name: Build and push the library image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the image to ghcr.io
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - id: date
        run: echo "date=$(date +'%Y.%-m.%-d')" >> "$GITHUB_OUTPUT"
      - name: Build locally and assert a single layer
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Containerfile
          load: true
          push: false
          provenance: false
          sbom: false
          tags: kurly-verify:latest
      - name: Assert exactly one layer
        # Single layer is the contract that lets the image serve as both an
        # image-volume mount and a Flux OCIRepository source.
        run: |
          n=$(docker image inspect kurly-verify:latest --format '{{ len .RootFS.Layers }}')
          [ "$n" = "1" ] || { echo "::error::kurly image has $n layers, expected 1"; exit 1; }
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push
        name: Build and push (:latest + dated calver tag)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Containerfile
          push: true
          # Arch-independent Jsonnet text, but a multi-arch index lets any node
          # arch pull the image as an OCIRepository source or image volume — the
          # same arch set every metio image ships.
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/ppc64le,linux/riscv64,linux/s390x
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.date.outputs.date }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
      - name: Sign
        run: cosign sign --yes "${{ env.IMAGE }}@${{ steps.push.outputs.digest }}"
