# Publishes two OCI artifacts per release, versioned by metio/ci calver and
# changelogged by git-cliff through metio/ci release-notes:
#
# - ghcr.io/metio/kurly — the library, a single-layer image laid out like a
#   jb vendor/ tree, consumable as a Flux OCIRepository source, an
#   image-volume mount, or via `jb install`.
# - ghcr.io/metio/kurly/examples/shop — the staged workload example, ONE
#   image whose layers are the rollout stages plus the migration ladder, each
#   under its own media type so a Flux OCIRepository selects exactly one via
#   spec.layerSelector.mediaType. This is the reference for the
#   kurly→jaas→stageset chain.
#
# The full assertion suite and example validation run first through the nix
# devShell, so a broken library never publishes.
name: Release
on:
  push:
    branches: [main]
  workflow_dispatch:
# Serialize release runs. Each run's release-notes lower bound is the latest
# tag at the time its prepare job runs; two merges in quick succession would
# both read that bound before either run has tagged, producing overlapping
# notes. Queueing (no cancel) lets the earlier release finish and create its
# tag first, so the next run's notes start from that tag and carry only its
# own commits.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
permissions:
  contents: read
env:
  LIBRARY_IMAGE: ghcr.io/metio/kurly
  WORKLOAD_IMAGE: ghcr.io/metio/kurly/examples/shop
jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      needed: ${{ steps.gate.outputs.needed }}
      version: ${{ steps.version.outputs.version }}
      previous: ${{ steps.gate.outputs.last }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - id: gate
        name: Check whether a release is needed
        uses: metio/ci/needs-release@553c5f3c3d2693c7ef182954136bdfac7b25b80e # 2026.7.2101318
        with:
          paths: '*.libsonnet examples Containerfile'
      - id: version
        name: Compute the next version
        if: steps.gate.outputs.needed == 'true'
        uses: metio/ci/calver@553c5f3c3d2693c7ef182954136bdfac7b25b80e # 2026.7.2101318
  validate:
    name: Test the library
    needs: prepare
    if: needs.prepare.outputs.needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/nix-devshell
      - name: Vendor k8s-libsonnet
        run: nix develop --command jb install
      - name: Run the assertion suite
        run: |
          nix develop --command bash -c "
            jsonnet -J vendor tests/kurly_test.jsonnet \
              | jq -e 'to_entries | all(.value == true)' >/dev/null
          "
      - name: Render examples and validate against the Kubernetes schemas
        run: nix develop --command hack/validate-examples.sh
  library:
    name: Publish the library image
    needs: [prepare, validate]
    if: needs.prepare.outputs.needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless image signing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Assert exactly one layer
        # Single layer is the library-image contract: it serves as both an
        # image-volume mount and a Flux OCIRepository source without a
        # layerSelector. (The workload example image is the deliberate
        # opposite — one layer PER stage, selected by media type.)
        run: |
          docker build --file Containerfile --tag kurly-verify:latest .
          n=$(docker image inspect kurly-verify:latest --format '{{ len .RootFS.Layers }}')
          [ "$n" = "1" ] || { echo "::error::kurly image has $n layers, expected 1"; exit 1; }
      - name: Build, push and sign the image
        uses: metio/ci/container-release@553c5f3c3d2693c7ef182954136bdfac7b25b80e # 2026.7.2101318
        with:
          image: ${{ env.LIBRARY_IMAGE }}
          version: ${{ needs.prepare.outputs.version }}
          file: ./Containerfile
  workload:
    name: Publish the staged workload example
    needs: [prepare, validate]
    if: needs.prepare.outputs.needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless image signing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/nix-devshell
      - name: Vendor k8s-libsonnet
        run: nix develop --command jb install
      - name: Build one layer per stage plus the migration ladder
        run: nix develop --command hack/build-workload-artifact.sh examples/staged.jsonnet examples/migrations.jsonnet dist
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push
        name: Push the layer-per-stage image
        # nix develop passes the environment through, so VERSION and the
        # GITHUB_* vars are visible inside the shell. layers.txt entries are
        # word-split into file:mediaType args deliberately.
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # The $vars expand inside the devShell's bash, not in this script.
          # shellcheck disable=SC2016
          nix develop --command bash -c '
            cd dist
            oras push --format json \
              --artifact-type application/vnd.metio.workload.v1 \
              --annotation "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY" \
              --annotation "org.opencontainers.image.revision=$GITHUB_SHA" \
              "$WORKLOAD_IMAGE:$VERSION,latest" \
              $(cat layers.txt) > push.json
          '
          echo "digest=$(jq -r .digest dist/push.json)" >> "$GITHUB_OUTPUT"
      - name: Sign
        run: nix develop --command cosign sign --yes "${{ env.WORKLOAD_IMAGE }}@${{ steps.push.outputs.digest }}"
  github:
    name: GitHub Release
    # Gate the release on green publishes: the notes advertise both image
    # tags, so they must exist before the release is published.
    needs: [prepare, validate, library, workload]
    if: needs.prepare.outputs.needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - id: notes
        name: Generate Release Notes
        uses: metio/ci/release-notes@553c5f3c3d2693c7ef182954136bdfac7b25b80e # 2026.7.2101318
        with:
          version: ${{ needs.prepare.outputs.version }}
          previous: ${{ needs.prepare.outputs.previous }}
      - name: Append usage footer
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          NOTES: ${{ steps.notes.outputs.file }}
        run: |
          cat >> "$NOTES" <<EOF

          ## Artifacts

          - **Library**: \`${LIBRARY_IMAGE}:${VERSION}\` — single layer, jb
            vendor-tree layout; register it as a JsonnetLibrary (Flux
            OCIRepository source) or mount it as an image volume.
          - **Staged workload example**: \`${WORKLOAD_IMAGE}:${VERSION}\` —
            one layer per rollout stage plus the migration ladder. Select a
            stage from a Flux OCIRepository:

            \`\`\`yaml
            spec:
              layerSelector:
                mediaType: application/vnd.metio.stage.production.tar+gzip
                operation: extract
            \`\`\`

            The migration ladder layer
            (\`application/vnd.metio.migrations.tar+gzip\`) feeds a StageSet's
            \`spec.migrationsSourceRef\`.

          Both images are signed with cosign keyless; verify with

          \`\`\`shell
          cosign verify <image>@<digest> \\
            --certificate-identity-regexp 'https://github.com/${{ github.repository }}/' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          \`\`\`
          EOF
      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          body_path: ${{ steps.notes.outputs.file }}
