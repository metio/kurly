name: Documentation
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docs/**
      # The assembler reads the catalog, so a catalog change must rebuild the
      # site even though no docs/ file changed.
      - catalog/**
  pull_request:
    paths:
      - docs/**
      - catalog/**
permissions:
  contents: read
jobs:
  website:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - name: Stage catalog into the site
        # Copies the committed catalog/catalog.json into docs/assets/ (gitignored);
        # the assembler embeds it. Keeps the site generated from committed source.
        run: nix develop --command gen-docs-data
      - name: Build Website
        run: nix develop --command hugo --minify --printI18nWarnings --printPathWarnings --source docs
      - name: Deploy Website
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/public
          force_orphan: true
          cname: kurly.projects.metio.wtf
