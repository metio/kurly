# Every tool gate runs through the flake's devShell (`nix develop --command`),
# so CI and local shells resolve the exact same tool versions from flake.lock.
# Renovate maintains the lock; no job installs tools any other way.
name: Verify
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command check-fmt
  catalog:
    # Regenerates catalog/catalog.json from the library annotations and fails if
    # the committed copy is stale — which also runs the drift asserts that fail
    # when a feature and its annotation fall out of step.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command check-catalog
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      # Vendors k8s-libsonnet (floats at upstream HEAD, matching the JOI
      # images), runs the assertion suite, and exercises the requiresService
      # negative check — all in scripts/check-tests.sh.
      - run: nix develop --command check-tests
  examples:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      # Persist kubeconform's downloaded schemas (Gateway API + operator CRDs)
      # across runs so validation does not re-fetch them every time. The rolling
      # run-id key with a shared restore prefix keeps it append-only: each run
      # restores the newest cache and saves a superset.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/kubeconform
          key: kubeconform-schemas-${{ github.run_id }}
          restore-keys: kubeconform-schemas-
      - run: nix develop --command check-examples
  coverage:
    # The catalog-driven battery: renders every feature/recipe/profile/kind
    # composition generated from the catalog and validates each with kubeconform.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/kubeconform
          key: kubeconform-schemas-${{ github.run_id }}
          restore-keys: kubeconform-schemas-
      - run: nix develop --command check-coverage
  security:
    # Kubernetes static analysis over the rendered manifests: kurly's own
    # invariants as conftest/Rego, plus pluto (deprecated APIs) and kubesec.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command check-security
  reuse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command reuse lint
  yaml:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command yamllint .
  github-actions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      # The devShell carries shellcheck alongside actionlint, so run: blocks
      # are shell-linted too — without it actionlint silently skips them.
      - run: nix develop --command actionlint
  markdown:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command markdownlint-cli2 "**/*.md" "#vendor" "#docs/themes"
  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command typos
  policy:
    # The metio org convention policies (conftest/Rego) from metio/ci: SHA
    # pins, permissions, timeouts, run-injection, and — because this repo
    # ships a flake.nix — the flake-owned-toolchain rules.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/ci/policy-check@749a4d81adf23ed252c309fa8bd94aec0e6b03c7 # 2026.7.15145237
  dco:
    # Developer Certificate of Origin: every commit must carry a Signed-off-by
    # trailer. Skipped for bot-authored PRs (Renovate/Dependabot cannot sign off);
    # a skipped job still satisfies the all-green gate below.
    if: github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - uses: metio/ci/dco@749a4d81adf23ed252c309fa8bd94aec0e6b03c7 # main
  verify:
    # Single required check covering every job above: mark only this one
    # required in branch protection and new jobs are covered automatically.
    name: Verify
    needs: [fmt, catalog, test, examples, coverage, security, reuse, yaml, github-actions, markdown, typos, policy, dco]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify every job succeeded or skipped
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          bad=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | "\(.key)=\(.value.result)"')
          [ -z "$bad" ] || { echo "::error::$bad"; exit 1; }
