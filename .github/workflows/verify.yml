name: Verify
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
      - name: jsonnetfmt --test
        run: go run github.com/google/go-jsonnet/cmd/jsonnetfmt@latest --test ./*.libsonnet examples/*.jsonnet tests/*.jsonnet
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
      - name: Vendor k8s-libsonnet
        # The dependency floats at upstream HEAD — the same state the JOI
        # k8s-libsonnet image ships — so an upstream break surfaces here as a
        # wanted signal rather than at a user's cluster.
        run: go run github.com/jsonnet-bundler/jsonnet-bundler/cmd/jb@latest install
      - name: Run the assertion suite
        run: |
          go run github.com/google/go-jsonnet/cmd/jsonnet@latest -J vendor tests/kurly_test.jsonnet \
            | jq -e 'to_entries | all(.value == true)' >/dev/null
          echo "all assertions passed"
      - name: Exposure onto a Service-less workload must fail
        # The requiresService assert is the only guard against silently
        # rendering a route to a Service that does not exist.
        run: |
          if go run github.com/google/go-jsonnet/cmd/jsonnet@latest -J vendor \
            -e "local kurly = import 'main.libsonnet'; kurly.worker.new('w', 'img:1') + kurly.expose.ingress('h.example.com')" >/dev/null 2>&1; then
            echo "::error::composing an exposure onto a worker rendered instead of failing"
            exit 1
          fi
          echo "assert fired as expected"
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
      - name: Install the Jsonnet toolchain
        run: |
          go install github.com/google/go-jsonnet/cmd/jsonnet@latest
          go install github.com/jsonnet-bundler/jsonnet-bundler/cmd/jb@latest
          go install github.com/yannh/kubeconform/cmd/kubeconform@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Vendor k8s-libsonnet
        run: jb install
      - name: Render examples and validate against the Kubernetes schemas
        run: hack/validate-examples.sh
  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6
  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: pipx install yamllint && yamllint .
  github-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          fail_on_error: true
          filter_mode: nofilter
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1
  dco:
    # Developer Certificate of Origin: every commit must carry a Signed-off-by
    # trailer. Skipped for bot-authored PRs (Renovate/Dependabot cannot sign off);
    # a skipped job still satisfies the all-green gate below.
    if: github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on every commit
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          status=0
          for sha in $(git rev-list "$BASE..$HEAD"); do
            name=$(git show -s --format='%an' "$sha")
            case "$name" in
              *'[bot]'*) echo "skip bot commit ${sha:0:8} ($name)"; continue ;;
            esac
            if git show -s --format='%B' "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "ok   ${sha:0:8}"
            else
              echo "::error::commit ${sha:0:8} by '$name' is missing a Signed-off-by line (use git commit --signoff)"
              status=1
            fi
          done
          exit $status
  verify:
    # Single required check covering every job above: mark only this one
    # required in branch protection and new jobs are covered automatically.
    name: Verify
    needs: [fmt, test, examples, reuse, yaml, github-actions, markdown, typos, dco]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify every job succeeded or skipped
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          bad=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | "\(.key)=\(.value.result)"')
          [ -z "$bad" ] || { echo "::error::$bad"; exit 1; }
