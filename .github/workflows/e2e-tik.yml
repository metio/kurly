# Per-workload e2e for tik. Self-gates on a diff scoped to this workload (plus
# the shared library and the e2e machinery), so a change to another workload never
# runs or blocks it; the aggregate stays green-by-skip when tik's sources are
# untouched. Delegates the matrix + run to the reusable e2e workflow.
name: E2E tik
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  tik:
    uses: ./.github/workflows/e2e.yml
    with:
      workload: tik
      paths: '^(workloads/tik/|lib/|main\.libsonnet|hack/smoke/(lib|scenario-tik)\.sh|\.github/workflows/e2e(-tik)?\.yml)'
      scenario: hack/smoke/scenario-tik.sh
